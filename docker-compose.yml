services:
  validator0:
    build:
      context: .
      dockerfile: mysticeti/Dockerfile
    container_name: mysticeti-validator0
    command: ["--authority-index","0","--config","/etc/mysticeti/docker-committee.toml","--storage-dir","/var/lib/mysticeti","--submit-listen-addr","0.0.0.0:7000"]
    volumes:
      - validator0-data:/var/lib/mysticeti
    networks:
      - mysticeti-net

  validator1:
    build:
      context: .
      dockerfile: mysticeti/Dockerfile
    container_name: mysticeti-validator1
    command: ["--authority-index","1","--config","/etc/mysticeti/docker-committee.toml","--storage-dir","/var/lib/mysticeti","--submit-listen-addr","0.0.0.0:7001"]
    volumes:
      - validator1-data:/var/lib/mysticeti
    networks:
      - mysticeti-net

  validator2:
    build:
      context: .
      dockerfile: mysticeti/Dockerfile
    container_name: mysticeti-validator2
    command: ["--authority-index","2","--config","/etc/mysticeti/docker-committee.toml","--storage-dir","/var/lib/mysticeti","--submit-listen-addr","0.0.0.0:7002"]
    volumes:
      - validator2-data:/var/lib/mysticeti
    networks:
      - mysticeti-net

  validator3:
    build:
      context: .
      dockerfile: mysticeti/Dockerfile
    container_name: mysticeti-validator3
    command: ["--authority-index","3","--config","/etc/mysticeti/docker-committee.toml","--storage-dir","/var/lib/mysticeti","--submit-listen-addr","0.0.0.0:7003"]
    volumes:
      - validator3-data:/var/lib/mysticeti
    networks:
      - mysticeti-net

  client:
    build:
      context: .
      dockerfile: mysticeti/Dockerfile
    container_name: mysticeti-client
    depends_on:
      - validator0
      - validator1
      - validator2
      - validator3
    environment:
      - MYSTICETI_CLIENT_TARGETS=validator0:7000,validator1:7001,validator2:7002,validator3:7003
      - MYSTICETI_CLIENT_DURATION_SECS=20
      - MYSTICETI_CLIENT_RATE_PER_SEC=20000
      - MYSTICETI_CLIENT_WAIT_SECS=30
      - MYSTICETI_CLIENT_WORKERS=4
    entrypoint: ["mysticeti-client"]
    networks:
      - mysticeti-net

  client2:
    build:
      context: .
      dockerfile: mysticeti/Dockerfile
    container_name: mysticeti-client2
    depends_on:
      - validator0
      - validator1
      - validator2
      - validator3
    environment:
      - MYSTICETI_CLIENT_TARGETS=validator0:7000,validator1:7001,validator2:7002,validator3:7003
      - MYSTICETI_CLIENT_DURATION_SECS=20
      - MYSTICETI_CLIENT_RATE_PER_SEC=20000
      - MYSTICETI_CLIENT_WAIT_SECS=30
      - MYSTICETI_CLIENT_WORKERS=4
    entrypoint: ["mysticeti-client"]
    networks:
      - mysticeti-net

networks:
  mysticeti-net:
    driver: bridge

volumes:
  validator0-data:
  validator1-data:
  validator2-data:
  validator3-data:

